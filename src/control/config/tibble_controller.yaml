controller_manager:
  ros__parameters:
    update_rate: 50 # This is in Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    tibble_controller:
      type: "tibble_controller/TibbleController"

tibble_controller:
  ros__parameters:
    wheel_radius: 0.929
    wheel_separation: 0.5659

    # Not really sure how but these auto populate in the controller code
    joints:
      - DL_Rotate
      - DR_Rotate
      - LA_Extend
      - Excavation_Rotate
    command_interfaces:
      - position
      - velocity
    state_interfaces:
      - position
      - velocity