controller_manager:
  ros__parameters:
    update_rate: 50 # This is in Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    tibble_controller:
      type: "tibble_controller/TibbleController"

tibble_controller:
  ros__parameters:
    command_topic: "~/cmd_vel"
    odometry_topic: "~/odom"
    transform_topic: "/tf"

    wheel_radius: 0.929             # meters
    wheel_separation: 0.5659        # meters

    paddle_speed: 12.25             # radians/second
    linear_actuator_speed: 0.01     # meters/second (in extension)
    excav_dt_speed_multiplier: 0.5  # multiply drivetrain speed by when excavating

    telemetry_update_rate: 3000     # milliseconds between printing

    # This populates as a list named "joints" when using auto_declare
    joints:
      - DL_Rotate
      - DR_Rotate
      - LA_Extend
      - Excavation_Rotate
    command_interfaces: # Every joint needs to have these command interfaces
      - position
      - velocity
    state_interfaces:   # Every joint needs to have these state interfaces
      - position
      - velocity